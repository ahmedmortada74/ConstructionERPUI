<div class="fade-in">

  <div class="page-header">
    <div>
      <div class="page-title">المواقع</div>
      <div class="page-subtitle">إدارة مواقع المشاريع والمخازن.</div>
    </div>
    <button class="btn btn-primary" (click)="openModal()">+ إضافة موقع</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-box">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="بحث...">
        </div>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-outline">&#8595; تصدير</button>
        <button class="btn btn-outline">&#9783; تصفية</button>
      </div>
    </div>

    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th style="width:40px;">#</th>
            <th>الكود</th>
            <th>الاسم</th>
            <th>التفاصيل</th>
            <th>الحالة</th>
            <th>التاريخ</th>
            <th style="width:80px; text-align:center;">إجراءات</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of items; let i = index">
            <td class="table-row-num">{{ i + 1 }}</td>
            <td><span class="table-code">{{ item.id }}</span></td>
            <td class="font-medium">{{ item.name }}</td>
            <td class="text-muted">{{ item.description }}</td>
            <td>
              <span class="badge" [ngClass]="item.status === 'نشط' ? 'badge-active' : 'badge-inactive'">
                <span class="status-dot" [ngClass]="item.status === 'نشط' ? 'active' : 'inactive'"></span>
                {{ item.status }}
              </span>
            </td>
            <td class="text-muted text-xs">{{ item.date }}</td>
            <td>
              <div class="action-btns" style="justify-content:center;">
                <button class="btn-icon edit" title="تعديل">&#9998;</button>
                <button class="btn-icon delete" title="حذف">&#128465;</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <span class="pagination-info">عرض 1–3 من أصل 3 سجلات</span>
      <div class="pagination-controls">
        <button class="page-btn" disabled>&#8249;</button>
        <button class="page-btn active">1</button>
        <button class="page-btn" disabled>&#8250;</button>
      </div>
    </div>
  </div>



  <!-- Modal Overlay -->
  <div class="modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3 class="card-header-title">إضافة عنصر جديد</h3>
        <button class="btn-icon" (click)="closeModal()">&#10006;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">الكود</label>
          <input type="text" class="form-control" placeholder="أدخل الكود...">
        </div>
        <div class="form-group">
          <label class="form-label">الاسم</label>
          <input type="text" class="form-control" placeholder="أدخل الاسم...">
        </div>
        <div class="form-group">
          <label class="form-label">التفاصيل</label>
          <textarea class="form-control" placeholder="أدخل التفاصيل..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">الحالة</label>
          <select class="form-control">
            <option>نشط</option>
            <option>غير نشط</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" (click)="closeModal()">إلغاء</button>
        <button class="btn btn-primary" (click)="closeModal()">حفظ</button>
      </div>
    </div>
  </div>
</div>
