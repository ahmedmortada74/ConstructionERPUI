<div class="fade-in">

  <div class="page-header">
    <div>
      <div class="page-title">Treasury Vouchers</div>
      <div class="page-subtitle">Manage and track Treasury Vouchers records.</div>
    </div>
    <button class="btn btn-primary">+ Create</button>
  </div>

  <div class="card">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-box">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Search Treasury Vouchers...">
        </div>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-outline">&#8595; Export</button>
        <button class="btn btn-outline">&#9783; Filter</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th style="width:40px;">#</th>
            <th>CODE</th>
            <th>NAME</th>
            <th>DETAILS</th>
            <th>STATUS</th>
            <th>DATE</th>
            <th style="width:80px; text-align:center;">ACTIONS</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of items; let i = index">
            <td class="table-row-num">{{ i + 1 }}</td>
            <td><span class="table-code">{{ item.id }}</span></td>
            <td class="font-medium">{{ item.name }}</td>
            <td class="text-muted">{{ item.details }}</td>
            <td>
              <span class="badge"
                [ngClass]="item.status === 'Active' ? 'badge-active' : 'badge-inactive'">
                <span class="status-dot" [ngClass]="item.status === 'Active' ? 'active' : 'inactive'"></span>
                {{ item.status }}
              </span>
            </td>
            <td class="text-muted text-xs">{{ item.date }}</td>
            <td>
              <div class="action-btns" style="justify-content:center;">
                <button class="btn-icon edit" title="Edit">&#9998;</button>
                <button class="btn-icon delete" title="Delete">&#128465;</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <span class="pagination-info">Showing 1â€“3 of 3 records</span>
      <div class="pagination-controls">
        <button class="page-btn" disabled>&#8249;</button>
        <button class="page-btn active">1</button>
        <button class="page-btn" disabled>&#8250;</button>
      </div>
    </div>

  </div>
</div>
