<nav class="sidebar" [class.collapsed]="isCollapsed">

  <!-- الشعار -->
  <div class="sidebar-brand">

    <ng-container *ngIf="!isCollapsed">
      <div class="brand-logo">🏗</div>
      <span class="brand-name">نظام إدارة شركات المقاولات</span>
    </ng-container>

    <button class="collapse-btn" (click)="toggleCollapse()" [title]="isCollapsed ? 'توسيع' : 'طي'">

      <span>{{ isCollapsed ? '‹' : '›' }}</span>

    </button>

  </div>

  <!-- القائمة -->
  <div class="sidebar-nav">

    <ng-container *ngFor="let group of navGroups">

      <!-- عنوان المجموعة -->
      <div class="nav-group-label" *ngIf="group.groupLabel && !isCollapsed">

        {{ group.groupLabel }}

      </div>

      <!-- عناصر القائمة -->
      <ng-container *ngFor="let item of group.items">

        <!-- عنصر بدون قائمة فرعية -->
        <a *ngIf="!item.children" [routerLink]="item.route" routerLinkActive="active" class="nav-item"
          [title]="isCollapsed ? item.label : ''">

          <span class="nav-icon">{{ item.icon }}</span>

          <span class="nav-label" *ngIf="!isCollapsed">

            {{ item.label }}

          </span>

        </a>

        <!-- عنصر يحتوي على قائمة فرعية -->
        <div *ngIf="item.children" class="nav-group">

          <div class="nav-item" (click)="toggleSubMenu(item)" [title]="isCollapsed ? item.label : ''">

            <span class="nav-icon">{{ item.icon }}</span>

            <span class="nav-label" *ngIf="!isCollapsed">

              {{ item.label }}

            </span>

            <span class="nav-chevron" *ngIf="!isCollapsed">

              {{ item.expanded ? '▾' : '▸' }}

            </span>

          </div>

          <div class="nav-submenu" *ngIf="item.expanded && !isCollapsed">

            <a *ngFor="let child of item.children" [routerLink]="child.route" routerLinkActive="active"
              class="nav-item sub">

              <span class="nav-label">
                {{ child.label }}
              </span>

            </a>

          </div>

        </div>

      </ng-container>

    </ng-container>

  </div>

</nav>
